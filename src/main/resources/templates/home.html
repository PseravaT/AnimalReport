<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AR - Homepage</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="home-container">

    <!-- HERO -->
    <section class="hero-section">

        <h1 class="titulo-menu hero-title">
            Central de Adoções
        </h1>

        <div class="carousel-wrapper">

            <div id="carouselExampleCaptions"
                 class="carousel slide"
                 data-bs-ride="carousel">

                <!-- INDICADORES -->
                <div class="carousel-indicators">

                    <button th:each="adocao, stat : ${adocoesDestaque}"
                            type="button"
                            data-bs-target="#carouselExampleCaptions"
                            th:attr="data-bs-slide-to=${stat.index}"
                            th:classappend="${stat.first} ? 'active' : null">
                    </button>

                </div>

                <div class="carousel-inner">

                    <div th:each="adocao, stat : ${adocoesDestaque}"
                         class="carousel-item"
                         th:classappend="${stat.first} ? ' active'">

                        <img th:src="${adocao.foto != null} ? @{/uploads/{img}(img=${adocao.foto})} : @{/images/default.png}"
                             class="d-block w-100 carousel-image"
                             alt="animal"/>

                        <div class="carousel-caption custom-caption">

                            <h5 th:text="${adocao.nomeAnimal + ', ' + adocao.idadeEstimada}"></h5>

                            <p th:text="${adocao.descricao}"></p>

                        </div>

                    </div>

                </div>

                <!-- CONTROLES -->

                <button class="carousel-control-prev"
                        type="button"
                        data-bs-target="#carouselExampleCaptions"
                        data-bs-slide="prev">

                    <span class="carousel-control-prev-icon"></span>

                </button>

                <button class="carousel-control-next"
                        type="button"
                        data-bs-target="#carouselExampleCaptions"
                        data-bs-slide="next">

                    <span class="carousel-control-next-icon"></span>

                </button>

            </div>
        </div>
    </section>

    <!-- BOTÕES SUPERIORES -->
    <section class="menu-actions">

        <div class="action-group">

            <a th:if="${usuarioLogado != null}"
               th:href="@{/adocao/minhasDoacoes}"
               class="custom-btn primary-btn">

                Minhas doações

            </a>

            <a th:if="${usuarioLogado == null or usuarioLogado.tipoUsuario == 'Comum'}"
               th:href="@{/adocao/cadastrar}"
               class="custom-btn primary-btn">

                Doar

            </a>

            <a th:if="${usuarioLogado != null and usuarioLogado.tipoUsuario == 'Comum'}"
               th:href="@{/adocao/home}"
               class="custom-btn secondary-btn">

                Adotar

            </a>

        </div>

    </section>

    <!-- TABELA -->
    <section class="container mt-5"
             th:if="${usuarioLogado != null}">

        <div class="status-card">

            <!-- HEADER -->
            <div class="status-header pt-5 pb-3">

                <h2 class="status-title"
                    style="font-size: 2.3rem;">

                    Denúncias Recentes

                </h2>

            </div>

            <!-- ALERTA -->
            <div th:if="${denuncias.isEmpty()}"
                 class="alert alert-secondary text-center m-4">

                Nenhuma denúncia registrada ainda.

            </div>

            <!-- TABELA -->
            <div class="table-responsive"
                 th:unless="${denuncias.isEmpty()}">

                <table class="table status-table align-middle mb-0">

                    <thead class="text-center">

                    <tr>

                        <th>Estado</th>

                        <th>Cidade</th>

                        <th>Bairro</th>

                        <th>Tipo</th>

                        <th>Urgência</th>

                        <th th:if="${usuarioLogado != null and usuarioLogado.tipoUsuario == 'Organizacao'}">
                            Ação
                        </th>

                    </tr>

                    </thead>

                    <tbody class="text-center">

                    <tr th:each="denuncia : ${denuncias}">

                        <td th:text="${denuncia.estado}"></td>

                        <td th:text="${denuncia.municipio}"></td>

                        <td th:text="${denuncia.bairro}"></td>

                        <td th:text="${denuncia.tipoAnimal.descricao}"></td>

                        <td>

                            <span th:text="${denuncia.urgencia.descricao}"
                                  class="fw-bold"

                                  th:classappend="${denuncia.urgencia.name() == 'EMERGENCIA' ? 'text-danger' :
                                    (denuncia.urgencia.name() == 'MUITO_URGENTE' ? 'text-warning' :
                                    (denuncia.urgencia.name() == 'URGENTE' ? 'text-warning' :
                                    (denuncia.urgencia.name() == 'POUCO_URGENTE' ? 'text-success' : 'text-info')))}">

                            </span>

                        </td>

                        <td th:if="${usuarioLogado != null and usuarioLogado.tipoUsuario == 'Organizacao'}">

                            <div class="status-actions">

                                <a th:href="@{/denuncias/detalhe/{id}(id=${denuncia.id})}"
                                   class="btn-status-primary">

                                    Ver mais

                                </a>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </section>

    <!-- BOTÕES INFERIORES -->
    <section class="menu-actions bottom-actions">

        <div class="action-group">

            <a th:if="${usuarioLogado != null}"
               th:href="@{/status}"
               class="custom-btn primary-btn">

                Status

            </a>

            <a th:if="${usuarioLogado == null or usuarioLogado.tipoUsuario == 'Comum'}"
               th:href="@{/denuncia}"
               class="custom-btn primary-btn">

                Denunciar

            </a>

            <a th:if="${usuarioLogado != null and usuarioLogado.tipoUsuario == 'Comum'}"
               th:href="@{/urgente}"
               class="custom-btn danger-btn">

                Emergência

            </a>

        </div>

    </section>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
