<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalhes da Denúncia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <button type="button" onclick="history.back()" class="btn btn-outline-light mb-4">
        ← Voltar para Lista
    </button>

    <div class="card card-detalhe shadow-lg">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Detalhes da Adoção</h3>
        </div>

        <div class="card-body">
            <div class="row">
                <div class="col-md-6 text-center mb-3 d-flex align-items-center justify-content-center">
                    <div th:if="${imagemDetalhe != null}">
                        <img th:src="${imagemDetalhe}" class="img-fluid shadow" alt="Foto do Animal">
                    </div>
                </div>

                <div class="col-md-6">

                    <h4 class="titulo-denuncia">Informações do Animal</h4>

                    <p class="text-denuncia2"><strong>Tipo:</strong> <span th:text="${adocao.tipoAnimal}"></span></p>

                    <p class="text-denuncia2"><strong>Nome provisório:</strong> <span th:text="${adocao.nomeAnimal}"></span></p>
                    <p class="text-denuncia2"><strong>Idade estimada:</strong> <span th:text="${adocao.idadeEstimada}"></span></p>
                    <p class="text-denuncia2"><strong>Descrição:</strong></p>
                    <div class="p-3 rounded mb-3 border border-secondary box-descricao">
                        <p class="text-denuncia2 mb-0" th:text="${adocao.descricao}">Descrição detalhada aqui...</p>
                    </div>

                    <hr style="border-color: #666;">

                    <button class="btn btn-success mt-2 w-100" type="button" data-bs-toggle="collapse" data-bs-target="#areaContato" aria-expanded="false" aria-controls="areaContato">
                        Entrar em contato
                    </button>

                    <div class="collapse mt-3" id="areaContato">
                        <div class="card card-body bg-dark border-secondary">
                            <h4 class="titulo-denuncia mb-2">Contato</h4>
                            <p class="text-white fs-5 fw-bold mb-0" th:text="${adocao.contato}"></p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
