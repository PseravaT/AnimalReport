<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AR - Status</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        /* Estilo para garantir que o texto não quebre o layout */
        .text-truncate-custom {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/navbar :: navbar}"></header>

<main>
    <div class="container mt-5" th:if="${usuarioLogado != null}">
        <h1 class="titulo-menu">Suas Doações</h1>
        <hr>
        <div class="tabela-fixa-container" style="height: auto !important; min-height: 500px !important; max-height: none !important; overflow-y: visible !important; max-width: 1200px; margin: auto;">

            <div th:if="${minhasAdocoes.isEmpty()}" class="alert alert-secondary text-center">
                Nenhuma adoção registrada ainda.
            </div>

            <table th:unless="${minhasAdocoes.isEmpty()}"
                   class="table table-dark table-striped mb-0 align-middle"
                   style="table-layout: fixed !important; width: 100% !important; display: table !important; border-collapse: collapse !important;">

                <thead style="display: table-header-group !important; width: 100% !important;">
                <tr style="display: table-row !important; width: 100% !important;">
                    <th style="width: 25% !important; border-bottom: 1px solid #444;">Nome</th>
                    <th style="width: 10% !important; border-bottom: 1px solid #444;">Idade</th>
                    <th style="width: 15% !important; border-bottom: 1px solid #444;">Tipo</th>
                    <th style="width: 25% !important; border-bottom: 1px solid #444;">Ação</th>
                    <th style="width: 25% !important; border-bottom: 1px solid #444;">Contato</th>
                    <th style="width: 25% !important; border-bottom: 1px solid #444;">Status</th>
                </tr>
                </thead>

                <tbody style="display: table-row-group !important; max-height: none !important; overflow-y: visible !important;">
                <tr th:each="adocao : ${minhasAdocoes}" style="display: table-row !important; width: 100% !important;">
                    <td class="text-truncate-custom"
                        th:text="${adocao.nomeAnimal}"
                        th:title="${adocao.nomeAnimal}">
                    </td>
                    <td th:text="${adocao.idadeEstimada}"></td>
                    <td th:text="${adocao.tipoAnimal.descricao}"></td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/adocao/home/detalhe/{id}(id=${adocao.id})}" class="btn btn-sm btn-primary">
                                Ver mais
                            </a>
                            <a th:href="@{/adocao/alterar/{id}(id=${adocao.id})}" class="btn btn-sm" style="background-color: goldenrod; color: white;">
                                Alterar
                            </a>
                        </div>
                    </td>
                    <td th:text="${adocao.contato}" class="fw-bold"></td>
                    <td style="width: 15%">
                        <span th:text="${adocao.statusAdocao.descricao}"
                              class="fw-bold"
                              th:classappend="${adocao.statusAdocao.name() == 'RETIRADA' ? 'text-danger' :
                                            (adocao.statusAdocao.name() == 'AGUARDANDO' ? 'text-warning' :
                                            (adocao.statusAdocao.name() == 'CONCLUIDA' ? 'text-success' : 'text-info'))}">
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
