<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AR - Status</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<header th:replace="~{fragments/navbar :: navbar}"></header>

<main>
    <div class="container mt-5" th:if="${usuarioLogado != null}">
        <h1 class="titulo-menu">Suas Doações</h1>
        <hr>
        <div class="tabela-fixa-container" style="max-height: 700px !important; overflow-y: auto !important; max-width: 1200px !important;">
            <div th:if="${minhasAdocoes.isEmpty()}" class="alert alert-secondary text-center">
                Nenhuma adoção registrada ainda.
            </div>

            <table th:unless="${minhasAdocoes.isEmpty()}" class="table table-dark table-striped mb-0 align-middle">
                <thead>
                <tr>
                    <th style="width: 15%">Nome</th>
                    <th style="width: 15%">Idade</th> 
                    <th style="width: 20%">Descrição</th>
                    <th style="width: 15%">Tipo</th>    
                    <th style="width: 15%">Status</th>
                    <th style="width: 30%"
                        th:if="${usuarioLogado != null}">
                        Ação
                    </th>
                    <th style="width:20% "> Contato </th>

                </tr>
                </thead>
                <tbody>

                <tr th:each="adocao : ${minhasAdocoes}">

                    <td style="width: 15%" th:text="${adocao.nomeAnimal}"></td>

                    <td style="width: 15%" th:text="${adocao.idadeEstimada}"></td>

                    <td style="width: 20%" th:text="${adocao.descricao}"></td>

                    <td style="width: 15%" th:text="${adocao.tipoAnimal.descricao}"></td>

                    <td style="width: 15%">
                        <span th:text="${adocao.statusAdocao.descricao}"
                            class="fw-bold"
                            th:classappend="${adocao.statusAdocao.name() == 'RETIRADA' ? 'text-danger' :
                                            (adocao.statusAdocao.name() == 'AGUARDANDO' ? 'text-warning' :
                                            (adocao.statusAdocao.name() == 'CONCLUIDA' ? 'text-success' : 'text-info'))}">
                        </span>
                    </td>

                    <td style="width: 30%" th:if="${usuarioLogado != null}">
                        <a th:href="@{/adocao/home/detalhe/{id}(id=${adocao.id})}" class="btn btn-sm btn-primary">
                            Ver mais
                        </a>
                        <a th:href="@{/adocao/home/alterar/{id}(id=${adocao.id})}" class="btn btn-sm" style="background-color: goldenrod">
                            alterar
                        </a>
                    </td>
                    <td style="width: 20%" th:text="${adocao.contato}" class="fw-bold" >

                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
