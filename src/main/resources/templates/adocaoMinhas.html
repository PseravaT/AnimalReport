<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AR - Minhas Doações</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<div class="page-wrapper">

    <main class="page-content">

        <section class="status-page" th:if="${usuarioLogado != null}">

            <!-- HEADER -->
            <div class="status-header">
                <h1 class="status-title">
                    Suas Doações
                </h1>

                <p class="status-subtitle">
                    Gerencie os animais cadastrados para adoção.
                </p>
            </div>

            <!-- ALERTA VAZIO -->
            <div th:if="${minhasAdocoes.isEmpty()}"
                 class="alert alert-secondary text-center">
                Nenhuma adoção registrada ainda.
            </div>

            <!-- CARD -->
            <div class="status-card"
                 th:unless="${minhasAdocoes.isEmpty()}">

                <div class="table-responsive">

                    <table class="table status-table align-middle">

                        <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Idade</th>
                            <th>Tipo</th>
                            <th>Contato</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="adocao : ${minhasAdocoes}">

                            <!-- NOME -->
                            <td class="fw-semibold text-truncate-custom"
                                th:text="${adocao.nomeAnimal}"
                                th:title="${adocao.nomeAnimal}">
                            </td>

                            <!-- IDADE -->
                            <td th:text="${adocao.idadeEstimada}">
                            </td>

                            <!-- TIPO -->
                            <td th:text="${adocao.tipoAnimal.descricao}">
                            </td>

                            <!-- CONTATO -->
                            <td class="fw-semibold"
                                th:text="${adocao.contato}">
                            </td>

                            <!-- STATUS -->
                            <td>

                                <span th:text="${adocao.statusAdocao.descricao}"
                                      class="fw-bold"

                                      th:classappend="${adocao.statusAdocao.name() == 'RETIRADA' ? 'text-danger' :
                                      (adocao.statusAdocao.name() == 'AGUARDANDO' ? 'text-warning' :
                                      (adocao.statusAdocao.name() == 'CONCLUIDA' ? 'text-success' :
                                      'text-info'))}">

                                </span>

                            </td>

                            <!-- AÇÕES -->
                            <td>

                                <div class="status-actions">

                                    <a th:href="@{/adocao/home/detalhe/{id}(id=${adocao.id})}"
                                       class="btn-status-primary">

                                        Ver mais

                                    </a>

                                    <a th:href="@{/adocao/alterar/{id}(id=${adocao.id})}"
                                       class="btn-status-warning">

                                        Alterar

                                    </a>

                                </div>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
