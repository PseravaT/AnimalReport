<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg app-navbar px-3"
     th:fragment="navbar">

    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand app-brand"
           th:href="@{/home}">

            <img src="/images/image-removebg-preview.png"
                 alt="Logo"
                 class="navbar-logo">

            <span>Animal Report</span>
        </a>

        <!-- DIREITA -->
        <div class="d-flex ms-auto align-items-center gap-3">

            <!-- LOGADO -->
            <div class="dropdown"
                 th:if="${usuarioLogado != null}">

                <button class="btn dropdown-toggle d-flex align-items-center gap-2 user-dropdown-btn"
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">

                    <div class="navbar-avatar">

                        <img th:src="${fotoPerfil != null ? fotoPerfil : '/images/perfilPadrao.jpg'}"
                             alt="Perfil">

                    </div>

                    <span class="navbar-user-text"
                          th:text="${usuarioLogado.nome}">
                        Usuário
                    </span>

                </button>

                <ul class="dropdown-menu dropdown-menu-end custom-dropdown-menu">

                    <li>

                        <a class="dropdown-item"
                           th:href="@{/entrar}">

                            Trocar usuário

                        </a>

                    </li>

                    <li>

                        <a class="dropdown-item"
                           th:href="@{/alterarUsuario/{id}(id=${usuarioLogado.id})}">

                            Alterar usuário

                        </a>

                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>

                        <a class="dropdown-item text-danger"
                           th:href="@{/logout}">

                            Sair

                        </a>

                    </li>

                </ul>

            </div>

            <!-- DESLOGADO -->
            <div class="d-flex align-items-center gap-2"
                 th:if="${usuarioLogado == null}">

                <a th:href="@{/entrar}"
                   class="btn btn-sm app-btn-outline">
                    Entrar
                </a>

                <a th:href="@{/registrar}"
                   class="btn btn-sm app-btn-light">
                    Cadastrar
                </a>
            </div>

        </div>

    </div>

</nav>

</body>
</html>
