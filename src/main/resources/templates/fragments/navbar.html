<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg app-navbar px-3"
     th:fragment="navbar">

    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand app-brand"
           th:href="@{/home}">

            <img src="/images/image-removebg-preview.png"
                 alt="Logo"
                 class="navbar-logo">

            <span>Animal Report</span>
        </a>

        <!-- DIREITA -->
        <div class="d-flex ms-auto align-items-center gap-3">

            <!-- LOGADO -->
            <div class="d-flex align-items-center gap-3"
                 th:if="${usuarioLogado != null}">

                <span class="navbar-user-text"
                      th:text="'Bem-vindo, ' + ${usuarioLogado.nome}">
                    Bem-vindo, Usuário
                </span>

                <div class="navbar-avatar">
                    <img th:src="${fotoPerfil != null ? fotoPerfil : '/images/perfilPadrao.jpg'}"
                         alt="Perfil">
                </div>

                <a th:href="@{/logout}"
                   class="btn btn-sm app-btn-danger">
                    Sair
                </a>
            </div>

            <!-- DESLOGADO -->
            <div class="d-flex align-items-center gap-2"
                 th:if="${usuarioLogado == null}">

                <a th:href="@{/entrar}"
                   class="btn btn-sm app-btn-outline">
                    Entrar
                </a>

                <a th:href="@{/registrar}"
                   class="btn btn-sm app-btn-light">
                    Cadastrar
                </a>
            </div>

        </div>

    </div>

</nav>

</body>
</html>
