<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>AR - Animais para Adoção</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <main class="conteudo-principal">
        <div class="container mt-5">
            <h1 class="titulo-adocao">Animais para adoção</h1>

            <div class="cards-grid-adocao">
                <div class="card-animal" th:each="a : ${listaAdocao}" th:if="${a.statusAdocao.name() == 'AGUARDANDO'}">

                    <div class="foto-moldura">
                        <img th:if="${a.fotoBase64 != null}"
                             th:src="'data:image/jpeg;base64,' + ${a.fotoBase64}" />
                        <img th:unless="${a.fotoBase64 != null}"
                             th:src="@{/images/sem-foto.jpg}" />
                    </div>

                    <h4 th:text="${a.nomeAnimal}">Nome</h4>
                    <p class="card-descricao"
                       th:text="${a.descricao != null ? #strings.abbreviate(a.descricao, 80) : 'Sem descrição disponível.'}">
                        Descrição breve
                    </p>
                    <p th:text="${a.statusAdocao.descricao}"
                        class="fw-bold"
                        th:classappend="${a.statusAdocao.name() == 'RETIRADA' ? 'text-danger' :
                                    (a.statusAdocao.name() == 'AGUARDANDO' ? 'text-warning' :
                                    (a.statusAdocao.name() == 'CONCLUIDA' ? 'text-success' : 'text-info'))}">
                    </p>

                    <a th:href="@{/adocao/home/detalhe/{id}(id=${a.id})}" class="btn-card-detalhes">
                        Ver Detalhes
                    </a>
                </div>
            </div>

            <div class="paginacao-container">
                <a th:if="${currentPage > 0}"
                   th:href="@{/adocao/home(pagina=${currentPage - 1})}"
                   class="btn-pag-seta">◀ Anterior</a>

                <span class="texto-paginacao">
            Página <span th:text="${currentPage + 1}"></span> de <span th:text="${totalPages}"></span>
        </span>

                <a th:if="${currentPage + 1 < totalPages}"
                   th:href="@{/adocao/home(pagina=${currentPage + 1})}"
                   class="btn-pag-seta">Próxima ▶</a>
            </div>
        </div>

        <span class="status-paginacao" th:if="${totalPages > 0}">
                Página <span th:text="${currentPage + 1}"></span>
                de <span th:text="${totalPages}"></span>
            </span>

        <a th:if="${currentPage + 1 < totalPages}"
           th:href="@{/adocao/home(pagina=${currentPage + 1})}"
           class="btn-paginacao">
            Próxima ▶
        </a>
        </div>

    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
