<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>AR - Login</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="body_login">

<div class="login-card">

    <div class="nav-cadastro">
        <img class="logo_img"
             th:src="@{/images/image-removebg-preview.png}"
             alt="Logo"/>

        <h2>Animal Report</h2>
    </div>

    <h2 class="text-center mb-4">Entrar</h2>

    <div th:if="${param.error}">
        <div class="alert alert-danger text-center">
            E-mail ou senha inválidos!
        </div>
    </div>

    <div th:if="${param.loginRequired}">
        <div class="alert alert-warning text-center">
            Você precisa estar logado para acessar esta página.
        </div>
    </div>

    <div th:if="${param.logoutSuccess}">
        <div class="alert alert-success text-center">
            Logout realizado com sucesso!
        </div>
    </div>

    <form class="form_login"
          action="/entrar"
          method="POST">

        <div class="mb-3">
            <input type="email"
                   class="form-control"
                   id="email"
                   name="email"
                   placeholder="E-mail"
                   required/>
        </div>

        <div class="mb-3">

            <input type="password"
                   class="form-control"
                   id="senha"
                   name="senha"
                   placeholder="Senha"
                   required/>

            <a class="msg_senha mt-2 d-inline-block"
               href="#">
                Esqueceu a senha?
            </a>
        </div>

        <button type="submit"
                class="form-main-btn w-100">
            Entrar
        </button>

    </form>

    <div class="text-center my-4">
        <span class="text-secondary">────────</span>
        <span class="mx-2">ou</span>
        <span class="text-secondary">────────</span>
    </div>

    <div class="d-flex justify-content-center mt-2">

        <div class="rounded-circle-apps bg-white p-2 mx-2">
            <img th:src="@{/images/google-icon-isolated-white-background_1273375-828.avif}"
                 alt="Google"
                 class="rounded-circle-apps"/>
        </div>

        <div class="rounded-circle-apps bg-white p-2 mx-2">
            <img th:src="@{/images/logotipo-do-facebook-em-um-circulo-azul_705838-12823.avif}"
                 alt="Facebook"
                 class="rounded-circle-apps"/>
        </div>

        <div class="rounded-circle-apps bg-white p-2 mx-2">
            <img th:src="@{/images/apple.png}"
                 alt="Apple"
                 class="rounded-circle-apps"/>
        </div>

    </div>

    <div class="msg_botton text-center">
        <span>Não tem uma conta? </span>

        <a th:href="@{/registrar}"
           class="msg_senha">
            Cadastre-se
        </a>
    </div>

    <div class="text-center">
        <a class="msg_senha"
           th:href="@{/home}">
            Entrar como visitante
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
