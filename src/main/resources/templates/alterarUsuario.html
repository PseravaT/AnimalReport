<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>AR - Alterar Cadastro</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link th:href="@{/css/style.css}" rel="stylesheet">

</head>

<body class="body_login">

<div class="login-card">

    <div class="nav-cadastro">
        <img class="logo_img"
             th:src="@{/images/image-removebg-preview.png}"
             alt="Logo"/>

        <h2>Animal Report</h2>
    </div>

    <h2 class="text-center mb-4">
        Alterar Usuário
    </h2>

    <form class="form_login"
          th:action="@{/alterarUsuario/{id}(id=${usuarioLogado.id})}"
          method="POST"
          enctype="multipart/form-data">

        <div class="mb-4">
            <label class="form-label-custom mb-2">
                Foto de Perfil
            </label>

            <label for="foto" class="upload-box d-flex flex-column justify-content-center
                            align-items-center rounded position-relative
                            overflow-hidden w-100">

                <img id="previewFoto"
                     th:src="${usuarioLogado.foto != null} ? @{/uploads/{img}(img=${usuarioLogado.foto})} : @{/images/perfilPadrao.jpg}"
                     class="upload-preview" style="display:block;">

                <div id="uploadPlaceholder" class="text-center text-light" style="display:none;">
                    <i class="bi bi-cloud-arrow-up upload-icon"></i>
                    <p class="mb-0"> Clique para alterar a foto </p>
                </div>

            </label>

            <input type="file" id="foto" name="foto" accept="image/*" hidden>
        </div>

        <div class="mb-3">
            <input type="text"
                   class="form-control"
                   id="nome"
                   name="nome"
                   th:placeholder="${usuarioLogado.nome}"
                   />
        </div>

        <div class="mb-3">
            <input type="email"
                   class="form-control"
                   id="email"
                   name="email"
                   th:placeholder="${usuarioLogado.email}"
                   />
        </div>

        <div class="mb-3">
            <input type="tel"
                   class="form-control"
                   id="telefone"
                   name="telefone"
                   th:placeholder="${usuarioLogado.telefoneFormatado}"
                   />
        </div>

        <div class="mb-3"
             th:if="${usuarioLogado.tipoUsuario == 'Comum'}">
            <input type="text"
                   class="form-control"
                   id="cpf"
                   name="cpf"
                   th:placeholder="${usuarioLogado.cpfFormatado}"
                   disabled/>
        </div>

        <div class="mb-3"
             th:if="${usuarioLogado.tipoUsuario == 'Organizacao'}">
            <input type="text"
                   class="form-control"
                   id="cnpj"
                   name="cnpj"
                   th:placeholder="${usuarioLogado.cnpjFormatado}"
                   disabled/>
        </div>

        <div class="mb-3"
             th:if="${usuarioLogado.tipoUsuario == 'Organizacao'}">
            <input type="text"
                   class="form-control"
                   id="inscricaoEstadual"
                   name="inscricaoEstadual"
                   th:placeholder="${usuarioLogado.inscricaoEstadual}"
                   disabled/>
        </div>

        <div class="mb-3"
             th:if="${usuarioLogado.tipoUsuario == 'Organizacao'}">

            <label for="tipoOrg"
                   class="form-label">
                Tipo de Organização
            </label>

            <select class="form-select"
                    id="tipoOrg"
                    name="tipoOrg"
                    disabled>

                <option th:value="${usuarioLogado.tipoOrg}"
                        th:text="${usuarioLogado.tipoOrg.descricao}"
                        selected>
                    Selecione o tipo...
                </option>


            </select>

        </div>

        <div class="input-group mb-3">

            <input type="password"
                   class="form-control"
                   id="senha"
                   name="senha"
                   placeholder="Senha"
                   />

            <button class="btn btn-outline-secondary"
                    type="button"
                    id="togglePassword1">

                <i class="bi bi-eye"></i>
            </button>

        </div>

        <div class="input-group mb-3">

            <input type="password"
                   class="form-control"
                   id="confirmar_senha"
                   name="confirmar_senha"
                   placeholder="Confirmar senha"
                   />

            <button class="btn btn-outline-secondary"
                    type="button"
                    id="togglePassword2">

                <i class="bi bi-eye"></i>
            </button>

        </div>

        <p class="msg_senha">
            <i class="bi bi-asterisk"></i>
            Sua senha precisa ter no mínimo 8 caracteres com ao menos 1 maiúsculo.
        </p>

        <button type="submit"
                class="form-main-btn w-100">
            Alterar Cadastro
        </button>

    </form>



</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/mask.js}"></script>

<script>

    const inputFoto = document.getElementById('foto');
    const previewFoto = document.getElementById('previewFoto');

    if (inputFoto && previewFoto) {

        inputFoto.addEventListener('change', function (event) {

            const arquivo = event.target.files[0];

            if (arquivo) {

                const reader = new FileReader();

                reader.onload = function (e) {

                    previewFoto.src = e.target.result;
                    previewFoto.style.display = 'block';

                };

                reader.readAsDataURL(arquivo);

            }

        });

    }

</script>

</body>
</html>
